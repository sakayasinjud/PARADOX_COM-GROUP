<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | PARADOX_COM GROUP</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-container">

<h1 class="form-title">
PARADOX_COM GROUP
</h1>

<p class="form-subtitle">
เข้าสู่ระบบร้านค้า
</p>

<form onsubmit="loginUser(event)">

<input
type="text"
id="username"
placeholder="ชื่อผู้ใช้"
required>

<input
type="password"
placeholder="รหัสผ่าน"
required>

<button
type="submit"
class="theme-btn">

เข้าสู่ระบบ

</button>

<p class="form-link">

ยังไม่มีบัญชี ?
<a href="register.html">

สมัครสมาชิก

</a>

</p>

</form>

</div>


<script>

function loginUser(event) {

event.preventDefault();

/* ดึงชื่อผู้ใช้ */

let username =
document.getElementById("username").value;

/* เก็บชื่อ */

localStorage.setItem(
"username",
username
);

/* ไปหน้าหลัก */

window.location.href =
"index.html";

}

</script>

</body>

</html>
