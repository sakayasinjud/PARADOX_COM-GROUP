<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>สมัครสมาชิก | PARADOX_COM GROUP</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-container">

<h1 class="form-title">
PARADOX_COM GROUP
</h1>

<p class="form-subtitle">
สมัครสมาชิก
</p>

<!-- สมัครเสร็จไป login -->
<form action="login.html">

<input
type="text"
placeholder="ชื่อผู้ใช้"
required
>

<input
type="password"
placeholder="รหัสผ่าน"
required
>

<button
type="submit"
class="theme-btn"
>

สมัครสมาชิก

</button>

<p class="form-link">

มีบัญชีแล้ว ?
<a href="login.html">

เข้าสู่ระบบ

</a>

</p>

</form>

</div>

</body>

</html>
